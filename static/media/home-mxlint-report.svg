  <!-- footer stats -->
  <line x1="170" y1="682" x2="1030" y2="682" stroke="#E4EEFA" stroke-width="2"/>
  <text x="600" y="736" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#5B7BA6">142 rules checked · 3 warnings · 0 blockers · CI gate ✓</text>
