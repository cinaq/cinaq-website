<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="120" y1="80" x2="1080" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5FAFF"/>
      <stop offset="1" stop-color="#E8F2FF"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#007BFF"/>
    </linearGradient>
    <filter id="soft2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#005FD1" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- canvas -->
  <rect x="40" y="40" width="1120" height="820" rx="48" fill="url(#bg2)"/>
  <g fill="#66B3FF" opacity="0.55">
    <circle cx="140" cy="160" r="7"/><circle cx="1060" cy="150" r="6"/><circle cx="110" cy="720" r="6"/>
    <circle cx="1085" cy="680" r="7"/>
  </g>

  <!-- report panel -->
  <g filter="url(#soft2)">
    <rect x="130" y="120" width="940" height="660" rx="32" fill="#FFFFFF"/>
  </g>

  <!-- header -->
  <circle cx="205" cy="196" r="26" fill="#007BFF"/>
  <path d="M193 196 l8 8 l14 -16" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="252" y="188" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="32" font-weight="800" fill="#0B1C33">MxLint</text>
  <text x="252" y="218" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="21" fill="#5B7BA6">Code quality report</text>

  <rect x="806" y="168" width="230" height="56" rx="28" fill="#E4F9EF"/>
  <circle cx="840" cy="196" r="13" fill="#00C776"/>
  <path d="M834 196 l4.5 4.5 l8 -9.5" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="864" y="204" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="22" font-weight="700" fill="#0E9257">Gate passed</text>

  <line x1="170" y1="256" x2="1030" y2="256" stroke="#E4EEFA" stroke-width="2"/>

  <!-- score ring -->
  <g>
    <circle cx="330" cy="470" r="118" stroke="#E4EEFA" stroke-width="26" fill="none"/>
    <circle cx="330" cy="470" r="118" stroke="url(#ring)" stroke-width="26" fill="none" stroke-linecap="round"
            stroke-dasharray="682 741" transform="rotate(-90 330 470)"/>
    <text x="330" y="478" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="88" font-weight="800" fill="#0B1C33">92</text>
    <text x="330" y="518" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="22" font-weight="600" fill="#5B7BA6">quality score</text>
  </g>

  <!-- check rows -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="23" font-weight="600" fill="#22436E">
    <g>
      <circle cx="560" cy="330" r="17" fill="#E4F9EF"/>
      <path d="M552 330 l6 6 l11 -13" stroke="#00C776" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
