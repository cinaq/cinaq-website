      <path d="M552 404 l6 6 l11 -13" stroke="#00C776" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="598" y="412">Naming conventions</text>
      <rect x="850" y="392" width="130" height="16" rx="8" fill="#E4EEFA"/>
      <rect x="850" y="392" width="118" height="16" rx="8" fill="#3D9BFF" opacity="0.9"/>
    </g>
    <g>
      <circle cx="560" cy="478" r="17" fill="#E4F9EF"/>
      <path d="M552 478 l6 6 l11 -13" stroke="#00C776" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="598" y="486">Architecture checks</text>
      <rect x="850" y="466" width="130" height="16" rx="8" fill="#E4EEFA"/>
      <rect x="850" y="466" width="104" height="16" rx="8" fill="#3D9BFF" opacity="0.9"/>
    </g>
    <g>
      <circle cx="560" cy="552" r="17" fill="#FFF4DE"/>
      <text x="560" y="560" text-anchor="middle" font-size="24" font-weight="800" fill="#E8A413">!</text>
      <text x="598" y="560">Documentation</text>
      <rect x="850" y="540" width="130" height="16" rx="8" fill="#E4EEFA"/>
      <rect x="850" y="540" width="76" height="16" rx="8" fill="#FFC53D"/>
    </g>
    <g>
      <circle cx="560" cy="626" r="17" fill="#E4F9EF"/>
      <path d="M552 626 l6 6 l11 -13" stroke="#00C776" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="598" y="634">Performance</text>
      <rect x="850" y="614" width="130" height="16" rx="8" fill="#E4EEFA"/>
      <rect x="850" y="614" width="122" height="16" rx="8" fill="#3D9BFF" opacity="0.9"/>
    </g>
